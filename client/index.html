<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- Primary Meta Tags -->
    <title>SalesCoach - Roofing Training Academy</title>
    <meta name="title" content="SalesCoach - Roofing Training Academy" />
    <meta name="description" content="Professional training platform for roofing sales teams. Learn door-to-door sales, objection handling, and close more deals." />

    <!-- Theme Color for Mobile Browsers -->
    <meta name="theme-color" content="#1e40af" />
    <meta name="msapplication-TileColor" content="#1e40af" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- Apple Mobile Web App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SalesCoach" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- Mask Icon for Safari Pinned Tab -->
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#1e40af" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Vapi Widget Script -->
    <script async src="https://unpkg.com/@vapi-ai/vanilla-client@2.5.0/dist/vapi.min.js"></script>
    <script>
      window.vapiLoaded = false;
      window.addEventListener('load', () => {
        if (!window.customElements.get('vapi-widget')) {
          const script = document.createElement('script');
          script.src = 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';
          script.defer = true;
          script.type = 'module';
          document.body.appendChild(script);
          script.onload = () => {
            window.vapiLoaded = true;
            console.log('VAPI widget loaded');
          };
        } else {
          window.vapiLoaded = true;
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
